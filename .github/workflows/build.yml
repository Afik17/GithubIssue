name: Build and Push

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

env:
  CI_REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.CI_REGISTRY_USERNAME }}/githubissue

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0 

      - name: Extract version from tag
        id: version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b664c736549414e037a41de2da2d9b6ba8 # v3.7.1

      - name: Log in to Docker Hub
        uses: docker/login-action@99b2f6f43410c2b63615707268d20e1ea1907f4f # v3.1.0
        with:
          registry: ${{ env.CI_REGISTRY }}
          username: ${{ secrets.CI_REGISTRY_USERNAME }}
          password: ${{ secrets.CI_REGISTRY_PASSWORD }}

      - name: Generate Docker image tags and labels
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691021dbb1cbe8fc2a9bcdb # v5.5.1
        with:
          images: ${{ env.CI_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=GithubIssue
            org.opencontainers.image.description=k8s webhook for GitHub Issues
            org.opencontainers.image.vendor=Dana

      - name: Build and push Docker image
        uses: docker/build-push-action@91df6e34ecb7d47c961cf0b37639033d46e3a601 # v6.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.CI_REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.CI_REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            TARGETOS=linux